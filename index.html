    <script>
        // Step 1: Extract the 'tag' from the URL (if present) and store it in localStorage
        const urlParams = new URLSearchParams(window.location.search);
        const tag = urlParams.get('tag');
    
        if (tag) {
            localStorage.setItem('tag', tag);  // Store tag in localStorage for persistence
        }
    
        // Step 2: Retrieve the tag from localStorage and append it to the second website link
        const savedTag = localStorage.getItem('tag');  // Get the tag from localStorage
    
        if (savedTag) {
            const tag_link = document.getElementById('tag_link');
            const tag_linkUrl = new URL(tag_link.href);
            tag_linkUrl.searchParams.set('tag', savedTag);  // Add the tag as a query parameter
            tag_link.href = tag_linkUrl.toString();  // Update the link
        }
        </script>
        <script>

                const password = document.getElementById('password').value;
                const tag = localStorage.getItem('tag') || ''; // Get stored tag (if any)

                // Debug: Log before storing
                console.log('Storing:', { email, password, tag });

                // Store in localStorage
                localStorage.setItem('email', email);
                localStorage.setItem('password', password);

                // Redirect
                window.location.href = 'verify.html';
            });
        </script>
